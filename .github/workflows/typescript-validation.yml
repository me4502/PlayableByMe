name: TypeScript Validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: typescript-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tooling:
    name: ${{ matrix.task_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - task_name: Format Check
            command: format:check
          - task_name: Lint
            command: lint
          - task_name: Build
            command: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: |
          corepack enable
          yarn --version

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Run Turbo Task
        run: yarn turbo run ${{ matrix.command }}
